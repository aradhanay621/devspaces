schemaVersion: 2.2.0
metadata:
  name: reproduce-workspace-issue
projects:
  - name: devfile-3p-python # <--- Must match this folder name
    git:
      remotes:
        origin: "https://github.com/your-organization/your-repo.git"
components:
  - name: dev-runtime
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 3Gi
      overrideCommand: true
      command: ['tail', '-f', '/dev/null']
      env:
        - name: VSCODE_DEFAULT_WORKSPACE
          value: "/projects/devfile-3p-python/.code-workspace" # <--- Updated path
commands:
  - id: install
    exec:
      component: dev-runtime
      commandLine: "npm install"
      workingDir: /projects/devfile-3p-python

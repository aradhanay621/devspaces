schemaVersion: 2.2.0
metadata:
  name: reproduce-workspace-issue
projects:
  - name: project-name # <--- Keeps it matching your folder
    git:
      remotes:
        origin: "https://github.com/your-organization/your-repo.git"
components:
  - name: dev-runtime
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 3Gi
      overrideCommand: true
      command: ['tail', '-f', '/dev/null']
      env:
        - name: VSCODE_DEFAULT_WORKSPACE
          value: "/projects/project-name/.code-workspace" # <--- Updated to match your pwd
commands:
  - id: install
    exec:
      component: dev-runtime
      commandLine: "npm install"
      workingDir: /projects/project-name

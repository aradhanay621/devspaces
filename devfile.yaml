schemaVersion: 2.2.2
metadata:
  name: customer-repro-subfolder
components:
  - name: tooling
    container:
      image: registry.access.redhat.com/ubi8/ubi-minimal:latest
      memoryLimit: 1.5Gi
      command: ['tail', '-f', '/dev/null']
      env:
        - name: VSCODE_DEFAULT_WORKSPACE
          value: "/projects/my-custom-folder/.code-workspace"
